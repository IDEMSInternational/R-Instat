name: Translation Check

on:
  pull_request_target:
    branches: [ "master" ]
    paths:
      - 'instat/**/*.vb'
      - 'instat/translations/**'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-translations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout trusted base tooling
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
          persist-credentials: false

      - name: Checkout PR content
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch base branch for diff
        working-directory: pr
        run: |
          git remote add base "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags base "refs/heads/${{ github.event.pull_request.base.ref }}:refs/remotes/base/${{ github.event.pull_request.base.ref }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run translation check
        id: translation-check
        working-directory: pr
        # Run trusted scripts from the base checkout against the PR checkout.
        # The PR checkout is treated only as data; no PR code is executed.
        run: |
          set +e
          python ../base/scripts/check_translations.py --ci --base="base/${{ github.event.pull_request.base.ref }}" > translation-report.txt 2>&1
          status=$?
          cat translation-report.txt
          exit $status

      - name: Add PR comment with results
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let report = '';
            try {
              report = fs.readFileSync('pr/translation-report.txt', 'utf8');
            } catch (e) {
              report = 'Translation check completed (no detailed report available)';
            }

            const summaryMatch = report.match(/<!-- translation-check-report:start -->[\s\S]*?<!-- translation-check-report:end -->/);
            const summary = summaryMatch ? summaryMatch[0] : report.substring(0, 2000);

            const failed = '${{ steps.translation-check.outcome }}' === 'failure';
            const fixHint = failed
              ? `\n\n**Missing translations detected.** Run \`python scripts/sync_translations.py\` locally and commit the updated \`instat/translations/en/*.json\`.`
              : '';

            const body = `${summary}${fixHint}\n\n---\n*This comment is automatically updated by the translation check workflow.*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('<!-- translation-check-report:start -->')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            }
