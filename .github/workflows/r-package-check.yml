name: Test R Package Installation

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test-r-packages:
    runs-on: windows-2022 
    
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
    
    # Check out R-Instat code
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0        

    # Extract R version from clsRLink.vb
    - name: Extract R version from clsRLink.vb
      id: get-r-version
      run: |
        $content = Get-Content "instat\clsRLink.vb"
        $versionLine = $content | Where-Object { $_ -match 'Private strRBundledVersion As String = "(.+)"' }
        if ($versionLine) {
          $rVersion = [regex]::Match($versionLine, 'Private strRBundledVersion As String = "(.+)"').Groups[1].Value
          Write-Host "Found R version: $rVersion"
          echo "r-version=$rVersion" >> $env:GITHUB_OUTPUT
        } else {
          Write-Host "Could not find R version, using default"
          echo "r-version=4.4.1" >> $env:GITHUB_OUTPUT
        }
      shell: powershell
     
    # Install R using the extracted version
    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: ${{ steps.get-r-version.outputs.r-version }}

        
    # Set up R-tools for package compilation
    - name: Set R-tools
      uses: r-windows/install-rtools@master 

    # Generate R scripts from r_packages.json
    - name: Generate R scripts
      run: python scripts/generate_r_scripts.py
      shell: powershell

    # Test R package installation using the generated install script
    - name: Test R packages installation
      run: |
        $installScript = "${{ github.workspace }}\instat\static\InstatObject\R\install_packages_generated.R"
        Rscript $installScript
      shell: powershell

    # Verify all packages from install_packages.R are installed
    - name: Analyze installation results
      id: analyze-packages
      run: |
        Write-Host "Checking installed packages..."
        $R_HOME = $(Rscript -e 'cat(R.home())')
        $checkScript = "${{ github.workspace }}\instat\static\InstatObject\R\check_packages_generated.R"
        $reportFile  = "package-check-report.txt"

        & "$R_HOME\bin\Rscript.exe" $checkScript "${{ github.workspace }}" $reportFile
        exit $LASTEXITCODE
      shell: powershell

    # Post a PR comment with the package check results
    - name: Add PR comment with results
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');

          let report = '';
          try {
            report = fs.readFileSync('package-check-report.txt', 'utf8');
          } catch (e) {
            report = 'Package check completed (no detailed report available)';
          }

          const summaryMatch = report.match(/<!-- package-check-report:start -->[\s\S]*?<!-- package-check-report:end -->/);
          const summary = summaryMatch ? summaryMatch[0] : report.substring(0, 2000);

          const failed = '${{ steps.analyze-packages.outcome }}' === 'failure';
          const fixHint = failed
            ? `\n\n**Missing packages detected.** Ensure all packages in \`instat/static/InstatObject/R/install_packages.R\` install correctly on the target R version.`
            : '';

          const body = `${summary}${fixHint}\n\n---\n*This comment is automatically updated by the R package check workflow.*`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number
          });

          const botComment = comments.find(c =>
            c.user.type === 'Bot' &&
            c.body.includes('<!-- package-check-report:start -->')
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
          }



